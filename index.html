// ===== 用 Netlify Function 抓資料（伺服器端代理）=====
async function fetchViaProxy(code, type) {
  const url = `/api/fund-proxy?code=${code}&type=${type}`;
  const res = await fetch(url, { signal: AbortSignal.timeout(12000) });
  // 不管成功或失敗都回傳 JSON（讓 parseNav/parseDiv 自行處理）
  try { return await res.json(); } catch(e) { return null; }
}

function parseNav(json) {
  try {
    // Vercel MoneyDJ API 格式
    if (json?.ok && json?.latest_nav != null) {
      return { latest_nav: json.latest_nav, latest_nav_date: json.latest_nav_date || '' };
    }
    // 舊版格式相容
    const items = json?.data?.items;
    if (Array.isArray(items) && items.length > 0) {
      const first = items[0];
      const dr = first.date || first.navDate;
      const ds = typeof dr==='number' ? new Date(dr*1000).toISOString().split('T')[0] : (dr||'');
      return { latest_nav: first.nav || first.price || 0, latest_nav_date: ds };
    }
  } catch(e){}
  return null;
}

function parseDiv(json) {
  try {
    // Vercel API 直接回傳 dividend_data 陣列
    if (json?.ok && Array.isArray(json?.dividend_data)) {
      return json.dividend_data.filter(d => d.amount > 0);
    }
    // 舊版格式相容
    const items = json?.data?.items || json?.items || json?.data || [];
    if (!Array.isArray(items)||!items.length) return null;
    return items.slice(0,3).map(d => ({
      basis_date: d.recordDate||d.basisDate||d.basis_date||(d.date?(typeof d.date==='number'?new Date(d.date*1000).toISOString().split('T')[0]:d.date):''),
      amount: Number(d.cashDividend??d.dividend??d.amount??d.divAmount??0),
      currency: d.currency||'',
    })).filter(d=>d.amount>0);
  } catch(e){}
  return null;
}

function getUniqueFunds() {
  const seen=new Set(), res=[];
  FUND_CONFIG.forEach(f=>{
    // 跳過沒有 MoneyDJ 代碼的基金（如 M&G南非幣）
    if(!CODES_WITH_MONEYDJ.has(f.code)) return;
    const dk=FUND_NAME_MAPPING[f.name]||f.name;
    if(!seen.has(dk)){seen.add(dk);res.push({code:f.code,dataKey:dk});}
  });
  return res;
}

function getFundInfo(name,fd){return fd[FUND_NAME_MAPPING[name]||name]||null;}
function getKValue(age,kt){const aa=Object.keys(kt).map(Number).sort((a,b)=>a-b);for(let i=aa.length-1;i>=0;i--)if(age>=aa[i])return kt[aa[i]];return kt[aa[0]]||1;}
function getCOIRate(age,gender,rates){const s=String(age);if(rates[s])return rates[s][gender];const aa=Object.keys(rates).map(Number).sort((a,b)=>a-b);for(let i=aa.length-1;i>=0;i--)if(age>=aa[i])return rates[aa[i]][gender];return rates[aa[0]][gender]||0;}
function calcCOI(inv,age,gender,cfg,fr){const f1=inv<300?100:0,f2=inv*10000*fr,ft=f1+f2,kv=getKValue(age,cfg.k_table),cr=getCOIRate(age,gender,cfg.rates),mc=cr*kv*inv,rc=mc*1.1;return{mgmt_fee1:f1,mgmt_fee2:f2,mgmt_fee_total:ft,k_value:kv,monthly_coi:mc,risk_cost:rc,monthly_fee_total:ft+rc};}

              <div className="stat-label">合計比率</div>
              <div className="stat-value orange">{summary.total.toFixed(2)}%</div>
              {summary.total>100&&<div style={{fontSize:'.75rem',color:'#b91c1c',fontWeight:'600',marginTop:'4px'}}>⚠️ 已超過100%</div>}
            </div>
            <div className="stat-card green"><div className="stat-label">月配息合計</div><div className="stat-value green">{summary.dt.toFixed(2)}</div></div>
            <div className="stat-card red">
              <div className="stat-label">配股合計</div>
              <div className="stat-value red">{summary.rt.toFixed(2)}</div>
              {summary.rt>0&&(summary.rt<coi.nw.monthly_fee_total||summary.rt<coi.rw.monthly_fee_total)&&
                <div style={{fontSize:'.75rem',color:'#b91c1c',fontWeight:'600',marginTop:'4px'}}>⚠️ 配股不足扣除費用</div>}
            </div>
            <div className="stat-card indigo"><div className="stat-label">年化配息率</div><div className="stat-value indigo">{summary.ar.toFixed(2)}%</div></div>
          </div>
        </div>
      </div>
      {/* 成本差異分析 */}
      <div className="card">
        <div className="card-header amber"><h2>保險成本差異分析</h2></div>
        <div className="card-body">
          <div className="grid-2">
            {[{label:'新天生贏家',data:coi.nw,rl:'0.165%',color:'blue'},{label:'富貴大贏家',data:coi.rw,rl:'0.2%',color:'emerald'}].map(({label,data,rl,color})=>(
              <div key={label} className={`coi-card ${color}`}>
                <h3>{label}</h3>
                <div className="coi-row"><span className="coi-row-label">管理費 1</span><span className="coi-row-value">NT${data.mgmt_fee1.toFixed(2)}</span></div>
                <div className="coi-row"><span className="coi-row-label">管理費 2 ({rl})</span><span className="coi-row-value">NT${data.mgmt_fee2.toFixed(2)}</span></div>
                <div className="coi-row"><span className="coi-row-label">管理費合計</span><span className="coi-row-value">NT${data.mgmt_fee_total.toFixed(2)}</span></div>
                <div className="coi-row"><span className="coi-row-label">K 值倍數</span><span className="coi-row-value">{data.k_value.toFixed(2)}</span></div>
                <div className="coi-row"><span className="coi-row-label">月 COI</span><span className="coi-row-value">NT${data.monthly_coi.toFixed(2)}</span></div>
                <div className="coi-row"><span className="coi-row-label">危險成本 (月COI×1.1)</span><span className="coi-row-value">NT${data.risk_cost.toFixed(2)}</span></div>
                <div className={`coi-total ${color}`}>
                  <span className="coi-total-label">每月費用合計</span>
                  <span className="coi-total-value">NT${data.monthly_fee_total.toFixed(2)}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="diff-section">
            <h4>📊 成本差異分析（新天生贏家 vs 富貴大贏家）</h4>
            {[
              {label:'管理費差異',val:coi.rw.mgmt_fee_total-coi.nw.mgmt_fee_total,pos:'新天生贏家較便宜',neg:'富貴大贏家較便宜'},
              {label:'危險成本差異',val:coi.nw.risk_cost-coi.rw.risk_cost,pos:'富貴大贏家較便宜',neg:'新天生贏家較便宜'},
              {label:'每月費用差異',val:coi.rw.monthly_fee_total-coi.nw.monthly_fee_total,pos:'新天生贏家較便宜',neg:'富貴大贏家較便宜'},
            ].map(({label,val,pos,neg})=>(
              <div className="diff-row" key={label}>
                <span className="diff-row-label">{label}</span>
                <span className={`diff-row-value ${val>0?'cheaper':'pricier'}`}>NT${Math.abs(val).toFixed(2)}（{val>0?pos:neg}）</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* COI 危險成本比較表 */}
      <div className="card">
        <div className="card-header amber"><h2>保險危險成本比較（新天生贏家 vs 富貴大贏家）</h2></div>
        <div className="card-body">
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th className="center">年齡</th>
                  <th className="right">新天生贏家<br/><span style={{fontSize:'.7rem',fontWeight:'normal'}}>危險成本</span></th>
                  <th className="right">富貴大贏家<br/><span style={{fontSize:'.7rem',fontWeight:'normal'}}>危險成本</span></th>
                  <th className="right" style={{color:'#b45309'}}>差異<br/><span style={{fontSize:'.7rem',fontWeight:'normal'}}>(富貴-新天)</span></th>
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const rows=[];
                  const startAge=age;
                  for(let a=startAge; a<=100; a+=5){
                    const nw=calcCOI(inv,a,gender,COI_DATA.COI,0.00165);
                    const rw=calcCOI(inv,a,gender,COI_DATA['COI-富貴'],0.002);

                    const isCurrentAge=a===startAge;
                    rows.push(
                      <tr key={a} style={isCurrentAge?{background:'#eff6ff',fontWeight:'600'}:{}}>
                        <td className="center" style={isCurrentAge?{color:'#1d4ed8'}:{}}>{a}歲{isCurrentAge?' ◀':''}</td>
                        <td className="right" style={{color:'#1d4ed8',fontWeight:'600'}}>NT${nw.risk_cost.toFixed(0)}</td>
                        <td className="right" style={{color:'#15803d',fontWeight:'600'}}>NT${rw.risk_cost.toFixed(0)}</td>
                        <td className="right" style={{color:(rw.risk_cost-nw.risk_cost)>0?'#b91c1c':'#15803d'}}>
                          {(rw.risk_cost-nw.risk_cost)>0?'+':''}{(rw.risk_cost-nw.risk_cost).toFixed(0)}
                        </td>
                      </tr>
                    );
                    if(a+5>100 && a<100){
                      // 補 100 歲
                      const nw100=calcCOI(inv,100,gender,COI_DATA.COI,0.00165);
                      const rw100=calcCOI(inv,100,gender,COI_DATA['COI-富貴'],0.002);
                      const diff100=rw100.monthly_fee_total-nw100.monthly_fee_total;
                      rows.push(
                        <tr key={100}>
                          <td className="center col-alloc">100歲</td>
                          <td className="right" style={{color:'#1d4ed8',fontWeight:'600'}}>NT${nw100.risk_cost.toFixed(0)}</td>
                          <td className="right" style={{color:'#15803d',fontWeight:'600'}}>NT${rw100.risk_cost.toFixed(0)}</td>
                          <td className="right" style={{color:(rw100.risk_cost-nw100.risk_cost)>0?'#b91c1c':'#15803d'}}>
                            {(rw100.risk_cost-nw100.risk_cost)>0?'+':''}{(rw100.risk_cost-nw100.risk_cost).toFixed(0)}
                          </td>
                        </tr>
                      );
                    }
                  }
                  return rows;
                })()}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:'10px',fontSize:'.75rem',color:'#94a3b8'}}>
            ◀ 目前輸入年齡｜每隔 5 歲顯示一列，最高至 100 歲｜差異為正數表示富貴大贏家較貴
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
